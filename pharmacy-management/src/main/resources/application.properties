# Application Name
spring.application.name=pharmacy-management

# Server Configuration
server.port=8801
server.servlet.context-path=/api/pharmacy

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=PharmacyManagement

# Alternatively you can use URI (keep only one configuration)
spring.data.mongodb.uri=mongodb://localhost:27017/PharmacyManagement

# Eureka Client Configuration
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Actuator (Optional but good for microservices)
management.endpoints.web.exposure.include=*

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.pharmacyManagement=DEBUG

# Jackson Configuration (for JSON formatting)
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata